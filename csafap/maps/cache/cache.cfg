// Custom alias for CACHE

alias map_CT_labels "exec csafap/maps/cache/cache_T_labels"
alias map_CT_cmd "m_yaw 0.022; exec csafap/maps/cache/cache_CT_cmd"

alias map_T_labels "exec csafap/maps/cache/cache_T_labels"
alias map_T_cmd "m_yaw 0.022; exec csafap/maps/cache/cache_T_cmd"

alias wheel_curr_map "exec csafap/maps/cache/wheel_curr_map"


alias +T_wheel_1 "reset_deadzone; exec csafap/maps/T_labels; setup_wheel; map_T_labels" 		// sens + zeroing horizontally
alias -T_wheel_1 "slot8; zero_lr; +radialradio2; T_hotkey2"										// equip smoke + zeroing vertically + open radiowheel + rebind hotkey
alias +T_wheel_2 "map_T_cmd"																	// change tile text to commands (alias set in csafap/[MAP]_labels.cfg)
alias -T_wheel_2 "-radialradio2; T_hotkey1; sens_reset; map_T_labels;resetradio"

