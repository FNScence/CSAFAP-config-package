	// Edit any keybinds to customize to your preference. To disable a feature, add "//" at the start of it's line.

//   ❗❗❗  EDIT NEXT LINE  ▼  to use YOUR own SENSITIVITY ❗❗❗
alias resetsens "sensitivity 1.0 ; mouse_inverty 0 ; sensitivity_y_scale 1" 	// ◄ SET YOUR PLAYING SENS HERE	(default 1.0 | 0 | 1 )

// =================== BASE KEYBINDS ========================================
bind						"M"			+map_action			// ◄ Key bind for MAP SELECTION + PRACTICE MODE (default M)
bind						"J"			+T_auto				// ◄ Key bind for T SMOKES (default J)
bind						"H"			+CT_auto			// ◄ Key bind for CT SMOKES (default H)
bind						"K"			+crosshair_action	// ◄ Key bind for PRO-CROSSHAIRS, BETTER FOLLOW-RECOIL, RAPID FIRE, SNAP-TAP (default K)

//bind					  "space"		+JT					// ◄ Key bind for desubticked   jumpthrow (radialradio method)
bind						"N"			+WJT				// ◄ Key bind for desubticked W-jumpthrow (radialradio method)

//bind						"Z"			+sladder			// ◄ Fast-Silent Ladder angle (key version)
//bind					 "mwheelup"		msladder			// ◄ Fast-Silent Ladder angle (mwheel version)

// ========== Enable settings at game launch (simply remove //) ============        
                exec csafap/movement/default				// ◄ Default movement binds (WASD)
// 			  alias load_movement load_null 				// ◄ Null binds

// =================== Crosshair & Viewmodel ================================
// ⚠️ Requirement for crosshair section: INSERT your crosshair and viewmodel settings here ▼
alias reset_crosshair "cl_crosshairstyle 4; cl_crosshair_recoil 0; cl_crosshairdot 0; cl_crosshairsize 1.8; cl_crosshairthickness 1; cl_crosshairgap -2.3; cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 1; cl_crosshaircolor 5; cl_crosshaircolor_b 0; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshairusealpha 1; cl_crosshairalpha 255; cl_crosshair_t 0; cl_crosshair_sniper_width 2"
alias reset_viewmodel "viewmodel_presetpos 1;viewmodel_fov 90;viewmodel_offset_x 1;viewmodel_offset_y 2;viewmodel_offset_z -1.5;"




















//\/\/\/\/\/\/\/\/\===========  DON'T EDIT THE REMAINING LINES   ===========/\/\/\/\/\/\/\/\
exec csafap/addons/loader	// ◄ DO NOT EDIT! Calling the main logic of the cfg-framework.
