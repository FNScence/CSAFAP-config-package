sleep 50
ent_fire tp_t1 AddOutput "OnTakeDamage>!activator>SetLocalOrigin>-1510.40 -3053.88 282.15>0>-1" 0.1
ent_fire tp_t1 AddOutput "OnTakeDamage>!activator>SetParent>tp_t1>0.01>-1" 0.1
ent_fire tp_t1 AddOutput "OnTakeDamage>!activator>SetLocalOrigin>0 0 90>0.02>-1" 0.1
