// Train Spawn Point Teleport Balloons

// Initial Setup
ent_create point_servercommand { targetname "cmd_runner" }

// --- T SIDE SPAWNS (Yellow) ---

// T1
ent_create prop_door_rotating { targetname "tp_t1" model "models/props/de_overpass/balloon.vmdl" origin "-1850.00 1256.00 -171.97" solid 6 health 999999 rendercolor "255 0 0" distance 0 hardware 0 spawnflags 0 }
sleep 50
ent_fire tp_t1 AddOutput "OnTakeDamage>!self>Open>>0>-1" 0.1
ent_fire tp_t1 AddOutput "OnOpen>cmd_runner>Command>T1_hint>0>-1" 0.1
ent_fire tp_t1 AddOutput "OnOpen>!activator>SetLocalOrigin>-1850.00 1256.00 -171.97>0>-1" 0.1
ent_fire tp_t1 AddOutput "OnOpen>!activator>SetParent>tp_t1>0.01>-1" 0.1
ent_fire tp_t1 AddOutput "OnOpen>!activator>SetLocalOrigin>0 0 93>0.02>-1" 0.1
ent_fire tp_t1 AddOutput "OnOpen>!activator>ClearParent>>0.03>-1" 0.1
ent_fire tp_t1 AddOutput "OnOpen>!self>Close>>0.05>-1" 0.1

